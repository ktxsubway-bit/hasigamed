<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>무한 드리프트 레이싱</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #111; font-family: 'Pretendard', sans-serif; user-select: none; }
        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; color: white;
        }
        #instructions {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.85); padding: 24px; border-radius: 16px;
            text-align: center; pointer-events: all; border: 2px solid #3b82f6;
            box-shadow: 0 0 30px rgba(59, 130, 246, 0.5);
            transition: opacity 0.3s;
            max-width: 400px; width: 90%;
        }
        .hud-panel {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            padding: 15px 25px;
        }
        #drift-text {
            position: absolute; top: 20%; left: 50%; transform: translate(-50%, -50%) scale(0.5);
            font-size: 60px; font-weight: 900; color: #f59e0b; font-style: italic;
            text-shadow: 0px 0px 20px #ef4444, 2px 2px 0px #000;
            opacity: 0; transition: all 0.1s ease-out;
        }
        .show-drift { opacity: 1 !important; transform: translate(-50%, -50%) scale(1.2) !important; }
        .speed-bar-container {
            width: 250px; height: 10px; background: rgba(255,255,255,0.2);
            border-radius: 5px; overflow: hidden; margin-top: 10px;
        }
        #speed-bar {
            height: 100%; width: 0%; background: linear-gradient(90deg, #3b82f6, #ef4444);
            transition: width 0.1s;
        }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div class="absolute top-6 left-6 hud-panel shadow-lg flex flex-col gap-2">
            <div class="text-gray-300 font-bold text-sm">SCORE</div>
            <div id="score" class="text-4xl font-black text-blue-400">0</div>
        </div>

        <div class="absolute bottom-10 right-10 hud-panel shadow-lg flex flex-col items-end">
            <div class="flex items-baseline gap-2">
                <span id="speed-text" class="text-5xl font-black text-white">0</span>
                <span class="text-gray-400 font-bold text-lg">km/h</span>
            </div>
            <div class="speed-bar-container"><div id="speed-bar"></div></div>
        </div>

        <div id="drift-text">DRIFT!!!</div>

        <div id="instructions">
            <h1 class="text-3xl font-black mb-2 text-blue-400 italic tracking-tighter">OPEN WORLD DRIFT</h1>
            <p class="mb-4 text-gray-300 text-sm">광활한 아스팔트 위에서 타이어를 불태우세요!</p>
           
            <div class="grid grid-cols-2 gap-2 text-xs text-left bg-white/5 p-4 rounded-lg mb-4 border border-white/10">
                <div class="flex items-center gap-2">
                    <kbd class="bg-gray-800 border border-gray-600 px-1.5 py-0.5 rounded text-white font-bold shadow-[0_2px_0_#4b5563]">W</kbd> 가속
                </div>
                <div class="flex items-center gap-2">
                    <kbd class="bg-gray-800 border border-gray-600 px-1.5 py-0.5 rounded text-white font-bold shadow-[0_2px_0_#4b5563]">S</kbd> 브레이크/후진
                </div>
                <div class="flex items-center gap-2">
                    <kbd class="bg-gray-800 border border-gray-600 px-1.5 py-0.5 rounded text-white font-bold shadow-[0_2px_0_#4b5563]">A</kbd> <kbd class="bg-gray-800 border border-gray-600 px-1.5 py-0.5 rounded text-white font-bold shadow-[0_2px_0_#4b5563]">D</kbd> 조향
                </div>
                <div class="flex items-center gap-2 text-yellow-400">
                    <kbd class="bg-yellow-600 border border-yellow-500 px-2 py-0.5 rounded text-white font-bold shadow-[0_2px_0_#854d0e]">SPACE</kbd> 드리프트!
                </div>
                <div class="flex items-center gap-2 col-span-2 text-red-400 mt-2 border-t border-white/10 pt-3">
                    <kbd class="bg-red-600 border border-red-500 px-2 py-0.5 rounded text-white font-bold shadow-[0_2px_0_#7f1d1d]">1</kbd> 자동차 자폭 스위치 (3초 후 리스폰)
                </div>
            </div>
            <button id="start-btn" class="w-full bg-blue-600 py-3 rounded-lg font-black text-base hover:bg-blue-500 transition-all active:scale-95 shadow-[0_0_15px_rgba(59,130,246,0.6)]">엔진 시동 (게임 시작)</button>
        </div>
    </div>

<script>
    // 전역 변수 설정
    let scene, camera, renderer, clock;
    let floor, grid; // 무한 맵을 위한 바닥, 그리드 변수
    let carGroup, carBody, wheels = [];
   
    // 키보드 입력
    const keys = { w: false, a: false, s: false, d: false, space: false };
   
    // 물리 엔진 및 차량 상태
    let speed = 0;
    const maxSpeed = 4000; // 🚀 최대 속도를 4000으로 증가!
    const acceleration = 1600; // 🚀 속도에 맞춰 가속도도 2배 증가
    const braking = 2000; // 🚀 브레이크 성능도 2배 증가
    const friction = 20;
   
    let angle = 0; // 차량이 바라보는 방향
    let steeringAngle = 0;
    let velocity = new THREE.Vector2(0, 0); // 실제 이동하는 벡터 (X, Z)
   
    let isDrifting = false;
    let score = 0;
    let gameStarted = false;
    let isExploded = false; // 차량 폭발 상태 변수

    // 🚀 오디오 시스템 변수 추가
    let audioCtx, engineOsc, engineGain, driftNode, driftGain;

    // 부드러운 스키드 마크(타이어 자국)를 그리기 위한 이전 바퀴 위치
    let lastRearLeftPos = null;
    let lastRearRightPos = null;

    // 시각 효과
    const particles = [];
    const skidMarks = [];
    const obstacles = []; // 장애물 무한 재배치를 위한 배열
   
    // UI 요소
    const scoreEl = document.getElementById('score');
    const speedEl = document.getElementById('speed-text');
    const speedBar = document.getElementById('speed-bar');
    const driftText = document.getElementById('drift-text');
    const startBtn = document.getElementById('start-btn');
    const instructions = document.getElementById('instructions');

    // 🚀 게임 사운드 초기화 (웹 오디오 API를 이용한 소리 합성)
    function initAudio() {
        if (audioCtx) return;
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        // 1. 엔진 소리 (낮은 톱니파)
        engineOsc = audioCtx.createOscillator();
        engineOsc.type = 'sawtooth';
        engineOsc.frequency.setValueAtTime(50, audioCtx.currentTime);

        engineGain = audioCtx.createGain();
        engineGain.gain.setValueAtTime(0.0, audioCtx.currentTime); // 처음엔 조용히

        const engineFilter = audioCtx.createBiquadFilter();
        engineFilter.type = 'lowpass';
        engineFilter.frequency.setValueAtTime(400, audioCtx.currentTime);

        engineOsc.connect(engineFilter);
        engineFilter.connect(engineGain);
        engineGain.connect(audioCtx.destination);
        engineOsc.start();

        // 2. 드리프트 타이어 마찰 소리 (화이트 노이즈)
        const bufferSize = audioCtx.sampleRate * 2;
        const noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
        const output = noiseBuffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) {
            output[i] = Math.random() * 2 - 1;
        }

        driftNode = audioCtx.createBufferSource();
        driftNode.buffer = noiseBuffer;
        driftNode.loop = true;

        const driftFilter = audioCtx.createBiquadFilter();
        driftFilter.type = 'bandpass';
        driftFilter.frequency.value = 1000;
        driftFilter.Q.value = 1.5;

        driftGain = audioCtx.createGain();
        driftGain.gain.value = 0; // 평소엔 음소거

        driftNode.connect(driftFilter);
        driftFilter.connect(driftGain);
        driftGain.connect(audioCtx.destination);
        driftNode.start();
    }

    // 🚀 폭발 소리 (순간적인 노이즈 폭발)
    function playExplosionSound() {
        if (!audioCtx) return;
        const bufferSize = audioCtx.sampleRate * 2;
        const noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
        const output = noiseBuffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) {
            // 시간에 따라 소리가 줄어드는 감쇠 효과 적용
            output[i] = (Math.random() * 2 - 1) * Math.exp(-i / (audioCtx.sampleRate * 0.3));
        }

        const explosionNode = audioCtx.createBufferSource();
        explosionNode.buffer = noiseBuffer;

        const filter = audioCtx.createBiquadFilter();
        filter.type = 'lowpass';
        filter.frequency.value = 800;

        const gain = audioCtx.createGain();
        gain.gain.value = 1.0;

        explosionNode.connect(filter);
        filter.connect(gain);
        gain.connect(audioCtx.destination);

        explosionNode.start();
    }

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); // 밝은 하늘색
        scene.fog = new THREE.FogExp2(0x87CEEB, 0.002); // 아득히 먼 곳 안개 처리

        camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        clock = new THREE.Clock();

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        // 조명 (광택을 돋보이게 하기 위해 대비를 높임)
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4); // 기본 밝기 낮춤
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 1.5); // 태양광을 강하게
        dirLight.position.set(100, 200, 50);
        dirLight.castShadow = true;
        dirLight.shadow.camera.top = 100;
        dirLight.shadow.camera.bottom = -100;
        dirLight.shadow.camera.left = -100;
        dirLight.shadow.camera.right = 100;
        dirLight.shadow.camera.near = 0.1;
        dirLight.shadow.camera.far = 500;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        scene.add(dirLight);

        // 거대한 아스팔트 바닥 (카메라 시야를 충분히 덮을 크기)
        const floorGeo = new THREE.PlaneGeometry(8000, 8000);
        const floorMat = new THREE.MeshStandardMaterial({
            color: 0x222222,
            roughness: 0.8,
            metalness: 0.2
        });
        floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        floor.receiveShadow = true;
        scene.add(floor);

        // 바닥의 그리드 (크기 8000, 400칸 분할 -> 1칸당 20)
        grid = new THREE.GridHelper(8000, 400, 0x555555, 0x333333);
        grid.position.y = 0.05;
        scene.add(grid);

        // 랜덤 장애물 (고깔콘)
        createObstacles();

        // 플레이어 차량 생성
        createCar();

        // 이벤트 리스너
        window.addEventListener('resize', onWindowResize);
        window.addEventListener('keydown', onKeyDown);
        window.addEventListener('keyup', onKeyUp);
       
        startBtn.addEventListener('click', () => {
            initAudio(); // 🚀 버튼을 누르면 오디오 엔진 시작!
            instructions.style.opacity = '0';
            setTimeout(() => {
                instructions.style.display = 'none';
                gameStarted = true;
            }, 300);
        });

        // 게임 루프 시작
        animate();
    }

    function createObstacles() {
        const coneGeo = new THREE.ConeGeometry(0.5, 1.5, 16);
        const coneMat = new THREE.MeshStandardMaterial({ color: 0xff6600, roughness: 0.4 });
       
        // 초기 스폰은 넓게 (800개의 고깔콘)
        for (let i = 0; i < 800; i++) {
            const x = (Math.random() - 0.5) * 4000;
            const z = (Math.random() - 0.5) * 4000;
           
            if (Math.abs(x) < 20 && Math.abs(z) < 20) continue; // 시작 지점 비우기

            const cone = new THREE.Mesh(coneGeo, coneMat);
            cone.position.set(x, 0.75, z);
            cone.castShadow = true;
            scene.add(cone);
            obstacles.push(cone); // 배열에 저장해두기
        }
    }

    function createCar() {
        carGroup = new THREE.Group();
       
        // 차체 생성 (자동차 광택 효과 극대화!)
        const bodyGeo = new THREE.BoxGeometry(2, 0.6, 4.5);
        const bodyMat = new THREE.MeshPhysicalMaterial({
            color: 0x1d4ed8,          // 반사가 잘 보이도록 약간 진한 스포츠카 블루
            metalness: 1.0,           // 완전한 메탈 느낌
            roughness: 0.05,          // 표면을 아주 매끄럽게 (거칠기 최소화)
            clearcoat: 1.0,           // 투명한 유리 코팅 최대로 적용
            clearcoatRoughness: 0.02, // 코팅 표면을 거울처럼 매끄럽게
            reflectivity: 1.0         // 빛 반사율 최대
        });
        carBody = new THREE.Mesh(bodyGeo, bodyMat);
        carBody.position.y = 0.6;
        carBody.castShadow = true;
        carGroup.add(carBody);

        // 🚀 자동차 표면의 하이라이트(광택 맺힘)를 만들기 위한 전용 조명 추가
        const glossyLight = new THREE.PointLight(0xffffff, 1.5, 15);
        glossyLight.position.set(2, 3, 3);
        carGroup.add(glossyLight);

        // 자동차 지붕(유리창)
        const roofGeo = new THREE.BoxGeometry(1.8, 0.5, 2.5);
        const roofMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.1, metalness: 0.9 });
        const roof = new THREE.Mesh(roofGeo, roofMat);
        roof.position.set(0, 1.15, -0.2);
        roof.castShadow = true;
        carGroup.add(roof);

        // 헤드라이트 (앞)
        const lightGeo = new THREE.BoxGeometry(0.4, 0.2, 0.1);
        const lightMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
        const lightL = new THREE.Mesh(lightGeo, lightMat);
        lightL.position.set(0.7, 0.6, -2.26);
        const lightR = new THREE.Mesh(lightGeo, lightMat);
        lightR.position.set(-0.7, 0.6, -2.26);
        carGroup.add(lightL, lightR);

        // 테일램프 (뒤)
        const tailMat = new THREE.MeshBasicMaterial({ color: 0xff0000 });
        const tailL = new THREE.Mesh(lightGeo, tailMat);
        tailL.position.set(0.7, 0.6, 2.26);
        const tailR = new THREE.Mesh(lightGeo, tailMat);
        tailR.position.set(-0.7, 0.6, 2.26);
        carGroup.add(tailL, tailR);

        // 스포일러 (스포츠카 느낌)
        const spoilerGeo = new THREE.BoxGeometry(2.2, 0.1, 0.5);
        const spoiler = new THREE.Mesh(spoilerGeo, bodyMat);
        spoiler.position.set(0, 1.0, 2.0);
       
        const spLeg1 = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.3, 0.2), new THREE.MeshStandardMaterial({color:0x111111}));
        spLeg1.position.set(0.6, 0.85, 2.0);
        const spLeg2 = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.3, 0.2), new THREE.MeshStandardMaterial({color:0x111111}));
        spLeg2.position.set(-0.6, 0.85, 2.0);
       
        carGroup.add(spoiler, spLeg1, spLeg2);

        // 바퀴 생성 함수
        const createWheel = (x, z) => {
            const wheelGroup = new THREE.Group();
            wheelGroup.position.set(x, 0.35, z);
           
            const wheelGeo = new THREE.CylinderGeometry(0.35, 0.35, 0.3, 16);
            wheelGeo.rotateZ(Math.PI / 2);
            const wheelMat = new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.9 });
            const wheel = new THREE.Mesh(wheelGeo, wheelMat);
            wheel.castShadow = true;
           
            // 휠 허브 디테일
            const hubGeo = new THREE.CylinderGeometry(0.2, 0.2, 0.32, 8);
            hubGeo.rotateZ(Math.PI / 2);
            const hubMat = new THREE.MeshStandardMaterial({ color: 0xaaaaaa, metalness: 0.8 });
            const hub = new THREE.Mesh(hubGeo, hubMat);
           
            wheelGroup.add(wheel, hub);
            carGroup.add(wheelGroup);
            wheels.push(wheelGroup);
            return wheelGroup;
        };

        // 앞바퀴 2개, 뒷바퀴 2개
        createWheel(1.1, -1.4); // 앞 왼쪽
        createWheel(-1.1, -1.4); // 앞 오른쪽
        createWheel(1.1, 1.4); // 뒤 왼쪽
        createWheel(-1.1, 1.4); // 뒤 오른쪽

        scene.add(carGroup);
    }

    function onKeyDown(e) {
        if(e.code === 'KeyW') keys.w = true;
        if(e.code === 'KeyA') keys.a = true;
        if(e.code === 'KeyS') keys.s = true;
        if(e.code === 'KeyD') keys.d = true;
        if(e.code === 'Space') keys.space = true;
        if(e.code === 'Digit1') explodeCar(); // 숫자 1번 키를 누르면 폭발!
    }

    function onKeyUp(e) {
        if(e.code === 'KeyW') keys.w = false;
        if(e.code === 'KeyA') keys.a = false;
        if(e.code === 'KeyS') keys.s = false;
        if(e.code === 'KeyD') keys.d = false;
        if(e.code === 'Space') keys.space = false;
    }

    // 자동차 폭발 이펙트 함수
    function explodeCar() {
        if (isExploded) return;
        isExploded = true;
        carGroup.visible = false; // 차체 숨기기
        speed = 0; // 즉시 정지
        velocity.set(0, 0); // 이동 관성 초기화
       
        playExplosionSound(); // 🚀 폭발 소리 재생!

        // 사방으로 튀어나가는 150개의 파편 조각 생성
        for (let i = 0; i < 150; i++) {
            const colors = [0xff0000, 0xff8800, 0xffff00, 0x333333]; // 불꽃과 파편 색상
            const mat = new THREE.MeshBasicMaterial({ color: colors[Math.floor(Math.random() * colors.length)] });
            const geo = new THREE.BoxGeometry(0.4, 0.4, 0.4);
            const p = new THREE.Mesh(geo, mat);
           
            p.position.copy(carGroup.position);
            p.position.y += 1;
           
            // 폭발력 계산 (X, Y, Z로 흩어짐)
            const vel = new THREE.Vector3(
                (Math.random() - 0.5) * 80,
                Math.random() * 60 + 10,
                (Math.random() - 0.5) * 80
            );
           
            scene.add(p);
            particles.push({ mesh: p, vel: vel, life: 3.0, isExplosion: true });
        }
       
        // UI 변경
        driftText.innerText = "BOOM!!!";
        driftText.style.color = "#ef4444";
        driftText.classList.add('show-drift');

        // 3초 후 리스폰
        setTimeout(respawnCar, 3000);
    }

    // 🚀 리스폰 함수 (초기 위치, 점수, 장애물 완벽 복구)
    function respawnCar() {
        isExploded = false;
       
        // 위치, 회전, 속도 초기화 (0, 0, 0)
        carGroup.position.set(0, 0, 0);
        angle = 0;
        carGroup.rotation.y = angle;
        speed = 0;
        velocity.set(0, 0);
        steeringAngle = 0;
        wheels[0].rotation.y = 0;
        wheels[1].rotation.y = 0;
       
        carGroup.visible = true; // 차체 다시 표시

        // 🚀 폭발 시 점수 0으로 완전 초기화
        score = 0;
        scoreEl.innerText = score;

        // 드리프트 상태 초기화
        isDrifting = false;
        lastRearLeftPos = null;
        lastRearRightPos = null;

        // 🚀 스폰 지점 주변으로 고깔콘(장애물) 정상 재배치
        for (let i = 0; i < obstacles.length; i++) {
            const cone = obstacles[i];
            const x = (Math.random() - 0.5) * 4000;
            const z = (Math.random() - 0.5) * 4000;
           
            // 스폰 지점(가운데)이 막히지 않도록 안전거리 확보
            if (Math.abs(x) < 20 && Math.abs(z) < 20) {
                cone.position.set(x + 50, 0.75, z + 50);
            } else {
                cone.position.set(x, 0.75, z);
            }
        }

        // 🚀 카메라 위치 즉시 복구 (화면을 위로 45도 올린 높이)
        const idealOffset = new THREE.Vector3(0, 12, 12);
        idealOffset.applyQuaternion(carGroup.quaternion);
        idealOffset.add(carGroup.position);
        camera.position.copy(idealOffset);
        camera.lookAt(carGroup.position);
        camera.fov = 60; // 🚀 리스폰 시 시야각 초기화
        camera.updateProjectionMatrix();

        // UI 텍스트 복구
        driftText.classList.remove('show-drift');
        setTimeout(() => {
            driftText.innerText = "DRIFT!!!";
            driftText.style.color = "#f59e0b";
        }, 300);
    }

    // 드리프트 시 타이어 연기 생성
    function createSmoke(pos) {
        const size = Math.random() * 1.5 + 0.5;
        const smokeGeo = new THREE.PlaneGeometry(size, size);
        const smokeMat = new THREE.MeshBasicMaterial({
            color: 0xdddddd,
            transparent: true,
            opacity: 0.6,
            depthWrite: false
        });
        const smoke = new THREE.Mesh(smokeGeo, smokeMat);
       
        // 연기가 바닥에서 피어오르도록 카메라를 바라보게 설정
        smoke.position.copy(pos);
        smoke.position.y = 0.2; // 살짝 위
        smoke.position.x += (Math.random() - 0.5) * 0.5;
        smoke.position.z += (Math.random() - 0.5) * 0.5;
       
        // 연기가 퍼지는 속도
        const vel = new THREE.Vector3(
            (Math.random() - 0.5) * 2,
            Math.random() * 2 + 1,
            (Math.random() - 0.5) * 2
        );
       
        scene.add(smoke);
        particles.push({ mesh: smoke, vel: vel, life: 1.0 });
    }

    // 드리프트 타이어 자국(스키드 마크) 생성 (점과 점을 이어 부드럽게)
    function createSkidMark(p1, p2) {
        const distance = p1.distanceTo(p2);
        if (distance < 0.05) return; // 겹침 방지 (너무 짧으면 무시)

        // 두 지점의 정확한 가운데 위치
        const midPoint = new THREE.Vector3().addVectors(p1, p2).multiplyScalar(0.5);
        // 이동한 방향의 각도 계산
        const angle = Math.atan2(p2.x - p1.x, p2.z - p1.z);

        // 이동한 거리(distance)만큼 길이를 늘려서 선을 만듦
        const geo = new THREE.PlaneGeometry(0.35, distance);
        const mat = new THREE.MeshBasicMaterial({ color: 0x111111, transparent: true, opacity: 0.4 });
        const skid = new THREE.Mesh(geo, mat);
       
        skid.position.copy(midPoint);
        skid.position.y = 0.02; // 바닥보다 아주 살짝 위 (z-fighting 방지)
        skid.rotation.x = -Math.PI / 2;
        skid.rotation.z = -angle; // 선이 이어지는 방향으로 회전
       
        scene.add(skid);
        skidMarks.push({ mesh: skid, life: 5.0 }); // 5초 후 사라짐
    }

    function updatePhysics(delta) {
        if (isExploded) return; // 차가 폭발했다면 물리엔진 작동 중지

        // --- 가속 및 브레이크 ---
        if (keys.w) {
            speed += acceleration * delta;
        } else if (keys.s) {
            speed -= braking * delta;
        } else {
            // 자연 마찰력 (감속)
            if (speed > 0) speed = Math.max(0, speed - friction * delta);
            if (speed < 0) speed = Math.min(0, speed + friction * delta);
        }

        // 최고 속도 제한
        speed = Math.max(-maxSpeed / 2, Math.min(maxSpeed, speed));

        // --- 조향 (Steering) ---
        // 핸들 꺾이는 속도를 대폭 낮춰서 부드럽게 (0.8)
        let turnSpeed = 0.8;
        if (Math.abs(speed) > 0.1) {
            if (keys.a) steeringAngle += turnSpeed * delta;
            if (keys.d) steeringAngle -= turnSpeed * delta;
        }
       
        // 키를 놓으면 핸들이 중앙으로 복귀하는 속도도 부드럽게 조절 (0.9)
        if (!keys.a && !keys.d) {
            steeringAngle *= 0.9;
        }
       
        // 바퀴가 최대로 꺾이는 각도 살짝 제한 (0.5)
        steeringAngle = Math.max(-0.5, Math.min(0.5, steeringAngle));
       
        // 앞바퀴 시각적 회전 처리
        wheels[0].rotation.y = steeringAngle;
        wheels[1].rotation.y = steeringAngle;

        // 스페이스바를 누르고, 속도가 어느정도 있고, 방향을 틀고 있을 때 드리프트 발동!
        isDrifting = keys.space && Math.abs(speed) > 3 && Math.abs(steeringAngle) > 0.1;

        // 회전량 계산 및 180도 스핀 부드럽게 방지
        const directionMultiplier = speed > 0 ? 1 : (speed < 0 ? -1 : 0);
        let turnAmount = steeringAngle * (Math.abs(speed) / maxSpeed) * directionMultiplier;

        if (isDrifting) {
            // 드리프트 시 차체가 확 돌아가는 속도를 부드럽게 감소 (0.8)
            const driftTurnMultiplier = speed > 0 ? 0.8 : 0;
            turnAmount += steeringAngle * driftTurnMultiplier * delta;
        }

        // 현재 차량이 실제로 이동하는 방향
        let velAngle = Math.atan2(velocity.x, velocity.y);
        if (velocity.lengthSq() < 1) velAngle = angle; // 저속일 때 각도 튀는 현상 방지
       
        // 차가 바라보는 방향(angle)과 실제 이동 방향(velAngle)의 차이 계산
        let slip = angle - velAngle;
        while (slip > Math.PI) slip -= Math.PI * 2;
        while (slip < -Math.PI) slip += Math.PI * 2;

        if (isDrifting) {
            // slipRatio: 미끄러지는 각도가 180도(Math.PI)에 가까워질수록 1에 수렴
            let slipRatio = Math.abs(slip) / Math.PI;
            // limitFactor: 180도가 되면 0이 되어 회전이 부드럽게 멈춤 (제곱을 사용하여 쫀득하게 잡힘)
            let limitFactor = Math.max(0, 1.0 - Math.pow(slipRatio, 2));
           
            // 이미 꺾인 방향으로 더 심하게 꺾어 스핀하려 할 때만 회전력을 제한 (카운터 스티어링은 자유롭게 허용)
            if (Math.sign(turnAmount) === Math.sign(slip)) {
                turnAmount *= limitFactor;
            }
        }

        // 최종적으로 차량 각도 업데이트
        angle += turnAmount;

        // --- 드리프트 코어 물리 (관성 유지) ---
        const forwardVector = new THREE.Vector2(Math.sin(angle), Math.cos(angle));
        const grip = isDrifting ? 1.5 : 10.0;
        const targetVelocity = forwardVector.clone().multiplyScalar(speed);
       
        // 현재 이동 벡터에서 목표 벡터로 부드럽게 보간 (Lerp) -> 미끄러지는 효과
        velocity.lerp(targetVelocity, delta * grip);

        // 차량 위치 업데이트 (실제 방향은 -Z가 앞이므로 좌표계 변환)
        carGroup.position.x += velocity.x * delta * -1;
        carGroup.position.z += velocity.y * delta * -1;
        carGroup.rotation.y = angle;

        // 바퀴 굴러가는 애니메이션
        const wheelSpin = speed * delta * 0.5;
        wheels.forEach(w => w.children[0].rotation.x += wheelSpin);

        // 🚀 오디오 업데이트 (엔진음 및 드리프트음)
        if (audioCtx && engineOsc) {
            // 속도에 따라 엔진 주파수(음높이)가 올라감
            const targetFreq = 50 + (Math.abs(speed) / maxSpeed) * 200;
            engineOsc.frequency.setTargetAtTime(targetFreq, audioCtx.currentTime, 0.1);

            // 가속(W) 중이거나 속도가 빠를수록 엔진 소리가 커짐
            let targetEngineGain = 0.05 + (Math.abs(speed) / maxSpeed) * 0.15;
            if (keys.w) targetEngineGain += 0.1;
            engineGain.gain.setTargetAtTime(targetEngineGain, audioCtx.currentTime, 0.1);
        }

        // --- 드리프트 효과 및 점수 계산 ---
        if (isDrifting) {
            driftText.classList.add('show-drift');
            score += Math.floor(Math.abs(speed) * 0.5);
            scoreEl.innerText = score.toLocaleString();
           
            // 🚀 드리프트 중일 때 타이어 마찰 소리 볼륨 올리기
            if (driftGain) {
                driftGain.gain.setTargetAtTime(0.3 + (Math.abs(speed) / maxSpeed) * 0.5, audioCtx.currentTime, 0.05);
            }

            const rearLeftPos = new THREE.Vector3(1.1, 0, 1.4).applyMatrix4(carGroup.matrixWorld);
            const rearRightPos = new THREE.Vector3(-1.1, 0, 1.4).applyMatrix4(carGroup.matrixWorld);

            if (lastRearLeftPos && lastRearRightPos) {
                createSkidMark(lastRearLeftPos, rearLeftPos);
                createSkidMark(lastRearRightPos, rearRightPos);
            }

            lastRearLeftPos = rearLeftPos.clone();
            lastRearRightPos = rearRightPos.clone();

            createSmoke(rearLeftPos);
            createSmoke(rearRightPos);
        } else {
            driftText.classList.remove('show-drift');
            lastRearLeftPos = null;
            lastRearRightPos = null;
           
            // 🚀 드리프트가 끝나면 타이어 마찰 소리 줄이기
            if (driftGain) {
                driftGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.1);
            }
        }
    }

    function updateParticles(delta) {
        // 연기 및 파편 파티클 애니메이션
        for (let i = particles.length - 1; i >= 0; i--) {
            const p = particles[i];
            p.mesh.position.add(p.vel.clone().multiplyScalar(delta));
           
            if (p.isExplosion) {
                // 폭발 파편일 경우: 중력 적용 및 빙글빙글 회전
                p.vel.y -= 9.8 * 8 * delta; // 중력
                p.mesh.rotation.x += delta * 10;
                p.mesh.rotation.y += delta * 10;
                p.life -= delta * 0.8;
                p.mesh.material.opacity = Math.max(0, p.life * 0.6);
            } else {
                // 일반 연기일 경우: 퍼지면서 사라짐
                p.mesh.scale.addScalar(delta * 2);
                p.life -= delta * 1.5;
                p.mesh.material.opacity = Math.max(0, p.life * 0.6);
                p.mesh.lookAt(camera.position);
            }

            if (p.life <= 0) {
                scene.remove(p.mesh);
                p.mesh.geometry.dispose();
                p.mesh.material.dispose();
                particles.splice(i, 1);
            }
        }

        // 스키드 마크 애니메이션 (시간 지나면 희미해짐)
        for (let i = skidMarks.length - 1; i >= 0; i--) {
            const s = skidMarks[i];
            s.life -= delta;
            if (s.life < 1.0) {
                s.mesh.material.opacity = s.life * 0.3; // 1초 남았을 때 페이드아웃
            }

            if (s.life <= 0) {
                scene.remove(s.mesh);
                s.mesh.geometry.dispose();
                s.mesh.material.dispose();
                skidMarks.splice(i, 1);
            }
        }
    }

    // 무한 맵 환경 업데이트 함수 (오브젝트 재배치)
    function updateWorld() {
        if (!carGroup || isExploded) return;

        // 1. 바닥이 자동차를 계속 따라다니게 함 (시야 제한 효과)
        floor.position.x = carGroup.position.x;
        floor.position.z = carGroup.position.z;

        // 2. 그리드는 칸 크기(20)의 배수로 스냅(Snap)하여 움직이게 해 이동하는 느낌을 줌
        grid.position.x = Math.floor(carGroup.position.x / 20) * 20;
        grid.position.z = Math.floor(carGroup.position.z / 20) * 20;

        // 3. 고깔콘 오브젝트 풀링 (시야를 벗어난 장애물을 앞으로 재배치)
        const despawnDistSq = 2500 * 2500; // 2500m 밖으로 나가면 안개 너머에서 재배치

        for (let i = 0; i < obstacles.length; i++) {
            const cone = obstacles[i];
            const dx = cone.position.x - carGroup.position.x;
            const dz = cone.position.z - carGroup.position.z;
            const distSq = dx * dx + dz * dz;

            // 시야에서 너무 멀어지면
            if (distSq > despawnDistSq) {
                // 자동차 주변(반경 2000~2400 사이 안개 속)에 랜덤 스폰
                const spawnAngle = Math.random() * Math.PI * 2;
                const spawnDist = 2000 + Math.random() * 400;
               
                cone.position.x = carGroup.position.x + Math.cos(spawnAngle) * spawnDist;
                cone.position.z = carGroup.position.z + Math.sin(spawnAngle) * spawnDist;
            }
        }
    }

    function updateCamera() {
        if (isExploded) return; // 폭발 시 카메라는 그 자리에 멈춤

        // 🚀 달리고 있을 때도 무조건 45도를 유지하도록 카메라를 차에 단단히 고정 (Y=12, Z=12)
        const idealOffset = new THREE.Vector3(0, 12, 12);
        idealOffset.applyQuaternion(carGroup.quaternion);
        idealOffset.add(carGroup.position);

        // 🚀 속도가 빠를 때 카메라가 뒤로 밀리면서 각도가 낮아지는(평평해지는) 현상 완전 제거
        camera.position.copy(idealOffset);

        // 카메라는 항상 자동차 중앙을 내려다봄
        camera.lookAt(carGroup.position);

        // 🚀 뒤로 밀리는 고무줄 효과를 없앤 대신, 속도에 따라 화면 시야각(FOV)이 넓어지며 엄청난 스피드감을 줌!
        const targetFOV = 60 + (Math.abs(speed) / maxSpeed) * 40; // 최고 속도에서 화면이 쫙 벌어짐
        camera.fov += (targetFOV - camera.fov) * 0.1;
        camera.updateProjectionMatrix();
    }

    function updateUI() {
        if (isExploded) return; // 폭발하면 UI 업데이트 멈춤

        // 속도계 표시 (절대값 정수 변환)
        const currentSpeedKmH = Math.floor(Math.abs(speed));
        speedEl.innerText = currentSpeedKmH;

        // 게이지 바 애니메이션
        const speedPercent = (Math.abs(speed) / maxSpeed) * 100;
        speedBar.style.width = speedPercent + "%";
    }

    function animate() {
        requestAnimationFrame(animate);
        const delta = Math.min(clock.getDelta(), 0.1); // 최대 프레임 딜레이 방지

        if (gameStarted) {
            updatePhysics(delta);
            updateParticles(delta);
            updateWorld(); // 무한 맵 업데이트
            updateCamera();
            updateUI();
        } else {
            // 게임 시작 전 카메라는 자동차 주변을 천천히 회전
            const time = clock.getElapsedTime();
            camera.position.set(Math.cos(time * 0.5) * 15, 5, Math.sin(time * 0.5) * 15);
            camera.lookAt(carGroup.position);
        }

        renderer.render(scene, camera);
    }

    function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }

    // 초기화 실행
    init();
</script>
</body>
</html>
